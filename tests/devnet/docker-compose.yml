services:
  haf:
    image: ${HAF_IMAGE}
    tty: true
    stdin_open: true
    init: true
    command: ""
    stop_grace_period: 2m
    shm_size: 1g
    environment:
      PG_ACCESS: |
        local haf_block_log haf_maintainer trust
        local haf_block_log haf_admin trust
        local haf_block_log hafah_user trust
        host haf_block_log haf_admin 0.0.0.0/0 trust
        host haf_block_log hafah_user 0.0.0.0/0 trust
      PGCTLTIMEOUT: 600
      OVERRIDE_LD_PRELOAD: ""
      SHARED_BUFFERS: 512MB
    volumes:
      - type: bind
        source: ${HAF_DATA_DIR}
        target: /home/hived/datadir
      - type: bind
        source: ${HAF_DATA_DIR}/logs/postgresql
        target: /home/hived/postgresql_logs/
    ports:
      - "${HIVE_PORT}:8091"
    networks:
      - devnet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T2 -nv -t1 --spider http://127.0.0.1:8091/ || exit 1",
        ]
      interval: 10s
      timeout: 2s
      retries: 10
      start_period: 5m

  db:
    image: ${MONGO_IMAGE}
    ports:
      - "127.0.0.1:${MONGO_PORT}:27017"
    networks:
      - devnet
    volumes:
      - db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      timeout: 5s
    deploy:
      resources:
        limits:
          memory: 1G

  hafah-install:
    image: ${HAFAH_IMAGE}
    command: install_app
    environment:
      POSTGRES_URL: postgresql://haf_admin@haf/haf_block_log
    depends_on:
      haf:
        condition: service_healthy
    networks:
      - devnet

  pgbouncer:
    image: ${PGBOUNCER_IMAGE}
    environment:
      PGBOUNCER_USERS: "hafah_user haf_admin"
      PGBOUNCER_LISTEN_ADDR: "*"
      PGBOUNCER_DB_HOST: haf
      PGBOUNCER_DB_PORT: 5432
      PGBOUNCER_DB_NAME: haf_block_log
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_MAX_DB_CONNECTIONS: 30
      PGBOUNCER_QUERY_WAIT_TIMEOUT: 120
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 6432 -U haf_admin -d haf_block_log || exit 1",
        ]
      interval: 10s
      timeout: 2s
      retries: 10
      start_period: 30s
    depends_on:
      haf:
        condition: service_healthy
    networks:
      - devnet

  hafah-postgrest:
    image: ${POSTGREST_IMAGE}
    environment:
      PGRST_SERVER_HOST: "*"
      PGRST_SERVER_PORT: 3000
      PGRST_ADMIN_SERVER_PORT: 3001
      PGRST_DB_URI: postgresql://hafah_user@pgbouncer:6432/haf_block_log
      PGRST_DB_SCHEMA: hafah_endpoints,hafah_api_v1,hafah_api_v2
      PGRST_DB_ROOT_SPEC: home
      PGRST_DB_ANON_ROLE: hafah_user
      PGRST_DB_POOL: 8
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: 10
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T2 -nv -t1 --spider http://127.0.0.1:3001/ready || exit 1",
        ]
      interval: 10s
      timeout: 2s
      retries: 10
      start_period: 1m
    depends_on:
      hafah-install:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    networks:
      - devnet

  drone:
    image: ${DRONE_IMAGE}
    environment:
      RUST_LOG: info
    volumes:
      - type: bind
        source: ${DRONE_CONFIG_PATH}
        target: /config.yaml
        read_only: true
    ports:
      - "${DRONE_PORT}:9000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/127.0.0.1/9000' 2>/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      hafah-postgrest:
        condition: service_healthy
    networks:
      - devnet

  devnet-setup:
    image: ${MAGI_IMAGE}
    profiles: ["setup"]
    depends_on:
      db:
        condition: service_healthy
      haf:
        condition: service_healthy
    command:
      - ./devnet-setup
      - -db-url=mongodb://db:27017
      - -data-dir=/data/devnet
      - -hive-urls=http://drone:9000
      - -nodes=${DEVNET_NODES}
      - -p2p-host=/dns4/magi-?
      - -drop-db
    volumes:
      - ${DEVNET_DATA_DIR}:/data/devnet
    networks:
      - devnet

  genesis-elector:
    image: ${MAGI_IMAGE}
    profiles: ["setup"]
    depends_on:
      db:
        condition: service_healthy
      haf:
        condition: service_healthy
    command:
      - ./genesis-elector
      - -network=devnet
      - -data-dir=/data/devnet/data-${GENESIS_NODE}
    volumes:
      - ${DEVNET_DATA_DIR}:/data/devnet
    networks:
      - devnet

  contract-deployer:
    image: ${MAGI_IMAGE}
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
      haf:
        condition: service_healthy
    volumes:
      - ${DEVNET_DATA_DIR}:/data/devnet
    networks:
      - devnet

  # bitcoind in regtest mode for oracle chain-relay tests.
  # Reachable inside the docker network as bitcoind:18443
  # (regtest JSON-RPC port). Optional — gated by the BITCOIND profile so
  # tests that don't need it skip the startup cost.
  #
  # -datacarriersize=400000 allows large OP_RETURN transactions (up to 400 KB)
  # for filling block data quickly in pruning tests (default 83 bytes is far
  # too small to reach the 128 MB block file threshold needed for pruning).
  bitcoind:
    image: ${BITCOIND_IMAGE}
    profiles: ["bitcoind"]
    command:
      - bitcoind
      - -regtest=1
      - -server=1
      - -txindex=1
      - -fallbackfee=0.0001
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcport=18443
      - -rpcuser=vsc-node-user
      - -rpcpassword=vsc-node-pass
      - -datacarriersize=400000
      - -printtoconsole=1
    ports:
      - "127.0.0.1:${BITCOIND_RPC_PORT:-18543}:18443"
    networks:
      - devnet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bitcoin-cli -regtest -rpcuser=vsc-node-user -rpcpassword=vsc-node-pass getblockchaininfo > /dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # bitcoind in regtest mode with manual pruning (-prune=1) for testing
  # the oracle's fetch-from-peer recovery path. Connected to the archive
  # bitcoind via P2P so getblockfrompeer can retrieve pruned block data.
  # The archive node acts as the NODE_NETWORK peer that serves full blocks.
  bitcoind-pruned:
    image: ${BITCOIND_IMAGE}
    profiles: ["bitcoind-pruned"]
    command:
      - bitcoind
      - -regtest=1
      - -server=1
      - -prune=1
      - -fallbackfee=0.0001
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcport=18443
      - -rpcuser=vsc-node-user
      - -rpcpassword=vsc-node-pass
      - -datacarriersize=400000
      - -connect=bitcoind:18444
      - -printtoconsole=1
    networks:
      - devnet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bitcoin-cli -regtest -rpcuser=vsc-node-user -rpcpassword=vsc-node-pass getblockchaininfo > /dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # bitcoind on mainnet with auto-pruning at the minimum 550 MB. Used by the
  # pruned-block-fetch test — mainnet blocks are already large enough that
  # pruning kicks in within a few minutes of IBD, avoiding the need to
  # generate artificial block data. Connected mainnet peers provide the
  # archive (NODE_NETWORK) source for getblockfrompeer recovery.
  bitcoind-mainnet-pruned:
    image: ${BITCOIND_IMAGE}
    profiles: ["bitcoind-mainnet-pruned"]
    command:
      - bitcoind
      - -server=1
      - -prune=550
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcport=18443
      - -rpcuser=vsc-node-user
      - -rpcpassword=vsc-node-pass
      - -printtoconsole=1
    networks:
      - devnet
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -rpcport=18443 -rpcuser=vsc-node-user -rpcpassword=vsc-node-pass getblockchaininfo > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # dashd in regtest mode for oracle Dash chain-relay tests.
  # Reachable inside the docker network as dashd:19898 (regtest JSON-RPC port).
  # Optional — gated by the "dashd" profile so tests that don't need it skip
  # the startup cost. Dash Core v23 has no separate default for datacarrier
  # size (uses same default as Bitcoin Core 0.21). Pruning-fill tests aren't
  # wired up for Dash yet, so we keep the flag off here.
  dashd:
    image: ${DASHD_IMAGE}
    profiles: ["dashd"]
    command:
      - dashd
      - -regtest=1
      - -server=1
      - -txindex=1
      - -fallbackfee=0.0001
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcport=19898
      - -rpcuser=vsc-node-user
      - -rpcpassword=vsc-node-pass
      - -printtoconsole=1
    ports:
      - "127.0.0.1:${DASHD_RPC_PORT:-19898}:19898"
    networks:
      - devnet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "dash-cli -regtest -rpcuser=vsc-node-user -rpcpassword=vsc-node-pass getblockchaininfo > /dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  db: {}

networks:
  devnet:
    driver: bridge
