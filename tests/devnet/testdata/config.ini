# Hived testnet configuration for devnet integration tests.
# Produces blocks with initminer, no peers required.

log-appender = {"appender":"stderr","stream":"std_error","time_format":"iso_8601_microseconds"}
log-logger = {"name":"default","level":"info","appenders":["stderr"]} {"name":"user","level":"debug","appenders":["stderr"]} {"name":"p2p","level":"warn","appenders":["stderr"]}

plugin = witness node_status_api account_by_key account_by_key_api block_api condenser_api database_api json_rpc market_history market_history_api network_broadcast_api p2p rc_api transaction_status transaction_status_api wallet_bridge_api webserver

p2p-endpoint = 0.0.0.0:2001
shared-file-size = 512M
block-log-split = -1

enable-stale-production = 1
required-participation = 0

witness = "initminer"
private-key = 5JNHfZYKGaomSFvd4NUdQ9qMcEAC43kujbfjueTHpVapX1Kzq2n
