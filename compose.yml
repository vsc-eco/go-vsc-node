services:
  init:
    profiles: ["init"]
    build:
      dockerfile: Dockerfile
      context: .
      target: vsc-node
    command: ./vsc-node --init
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      - db
    networks:
      - go-vsc-node
    volumes:
      - ./data:/home/app/app/data
  app:
    profiles: ["default"]
    build:
      dockerfile: Dockerfile
      context: .
      target: vsc-node
    ports:
      - "8094:8080"
      - "10724:10720"
      - "10724:10720/udp"
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      - db
    networks:
      - go-vsc-node
    volumes:
      - ./data:/home/app/app/data
  db:
    image: mongo:8.0.17
    # restart: always
    command:
      - mongod
      - --replSet=rs0
      - --bind_ip_all
      - --setParameter
      - transactionLifetimeLimitSeconds=300
    ports:
      - 127.0.0.1:27017:27017
    networks:
      - go-vsc-node
    volumes:
      - db:/data/db
    healthcheck:
      # Self-initiate a single-node replica set on first run, then report
      # healthy only when this node has reached PRIMARY.
      test:
        - "CMD-SHELL"
        - |
          mongosh --quiet --eval '
            try {
              var s = rs.status();
              quit(s.ok && s.myState === 1 ? 0 : 1);
            } catch (e) {
              if (e.codeName === "NotYetInitialized") {
                rs.initiate({_id: "rs0", members: [{_id: 0, host: "db:27017"}]});
              }
              quit(1);
            }
          '
      interval: 10s
      retries: 10
      timeout: 5s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
  bitcoind:
    image: bitcoin/bitcoin:29.3
    container_name: vsc-btcd
    command: -rpcuser=vsc-node-user -rpcpassword=vsc-node-pass -rpcallowip=0.0.0.0/0 -rpcbind=0.0.0.0 -prune=550 -dbcache=2048 -server=1 -listen=1
    restart: always
    networks:
      - go-vsc-node
    volumes:
      - ./.btc-data:/home/bitcoin/.bitcoin
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
  mapping-bot:
    profiles: ["mapping-bot"]
    build:
      dockerfile: Dockerfile.mapping-bot
      context: .
    command: []
    ports:
      - 127.0.0.1:8000:8000
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      db:
        condition: service_healthy
    networks:
      - go-vsc-node
    volumes:
      - ./data/mapping-bot:/home/app/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 2m
      timeout: 5s
      retries: 3
      start_period: 30s
volumes:
  db: {}
networks:
  go-vsc-node:
    driver: bridge
