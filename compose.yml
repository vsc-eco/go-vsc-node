services:
  init:
    profiles: ["init"]
    build:
      dockerfile: Dockerfile
      context: .
    command: ./vsc-node --init
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      - db
    networks:
      - go-vsc-node
    volumes:
      - ./data:/home/app/app/data
  app:
    profiles: ["default"]
    build:
      dockerfile: Dockerfile
      context: .
    ports:
      - "8080:8080"
      - "10720:10720"
      - "10720:10720/udp"
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      - db
    networks:
      - go-vsc-node
    volumes:
      - ./data:/home/app/app/data
  db:
    image: mongo:8.0.17
    # restart: always
    ports:
      - 127.0.0.1:27017:27017
    networks:
      - go-vsc-node
    volumes:
      - db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      timeout: 5s
    deploy:
      resources:
        limits:
          memory: 1G
  btcd:
    profiles:
      - btcd
    image: ruimarinho/bitcoin-core:latest
    container_name: btcd
    command: -rpcuser='vsc-node-user' -rpcpassword='vsc-node-pass' -rpcallowip=0.0.0.0/0 -rpcbind=0.0.0.0 -prune=550 -dbcache=2048 -server=1 -listen=1
    volumes:
      - ./.btc-data:/home/bitcoin/.bitcoin
    ports:
      - 8332:8332 # rpc port
  tss-bridge:
    build:
      dockerfile: Dockerfile
      context: .
    command: ["./tss-bridge"]
    environment:
      - TSS_BRIDGE_BIND=:8081
    ports:
      - "8081:8081"
    networks:
      - go-vsc-node
    container_name: tss-bridge
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  db: {}
networks:
  go-vsc-node:
    driver: bridge
